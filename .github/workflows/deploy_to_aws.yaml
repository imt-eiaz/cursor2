name: CICD pipeline

on:
  push:
    branches: [main]

jobs:
  deploy_code:
    name: deploy_code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install all dependencies
        run: npm run install-all

      - name: Build client
        run: npm run build

      - name: Deploy to AWS
        uses: easingthemes/ssh-deploy@v5.0.3
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SOURCE: "."
          REMOTE_HOST: ec2-13-61-33-241.eu-north-1.compute.amazonaws.com
          REMOTE_USER: "ubuntu"
          TARGET: "/var/www/cursor2/"
